version: '3.8'

# Production Docker Compose
# Optimized for deployment with security, monitoring, and scaling

services:
  # ============================================
  # AI Job Search API (Production)
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: ai-job-search-api-prod
    restart: always
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=INFO
      - PROFILE_PATH=/app/data/structures/perfil.md
      - OUTPUT_PATH=/app/output
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/
      # Production settings
      - WORKERS=4  # uvicorn workers
      - METRICS_ENABLED=true
    volumes:
      - api_data:/app/data
      - api_output:/app/output
      - api_logs:/app/logs
    depends_on:
      n8n:
        condition: service_healthy
    networks:
      - ai-job-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================
  # n8n (Production)
  # ============================================
  n8n:
    image: docker.n8n.io/n8nio/n8n:1.81.0  # Pin specific version for stability
    container_name: ai-job-search-n8n-prod
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_USER_EMAIL=${N8N_USER_EMAIL}
      - N8N_USER_PASSWORD=${N8N_USER_PASSWORD}
      - WEBHOOK_URL=${WEBHOOK_URL}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      # Production optimizations
      - EXECUTIONS_DATA_PRUNE_ENABLED=true
      - EXECUTIONS_DATA_MAX_AGE=72  # 3 days
      - EXECUTIONS_DATA_PRUNE_TIMEOUT=5
      - GENERIC_TIMEZONE=${TZ:-UTC}
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=true
      - N8N_SECURE_COOKIE=true
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ai-job-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5678/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================
  # PostgreSQL (Production)
  # ============================================
  db:
    image: postgres:15-alpine
    container_name: ai-job-search-db-prod
    restart: always
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=n8n
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backups/db:/backups  # Backup mount
    networks:
      - ai-job-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ============================================
  # WhatsApp Gateway (Optional)
  # ============================================
  whatsapp:
    build:
      context: ./whatsapp-gateway
      dockerfile: Dockerfile
    container_name: ai-job-search-whatsapp-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}/whatsapp
      - SESSION_PATH=/app/data/whatsapp-session
    volumes:
      - api_data:/app/data
    depends_on:
      n8n:
        condition: service_healthy
    networks:
      - ai-job-network
    profiles:
      - with-whatsapp
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

networks:
  ai-job-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  n8n_data:
    driver: local
  db_data:
    driver: local
  api_data:
    driver: local
  api_output:
    driver: local
  api_logs:
    driver: local