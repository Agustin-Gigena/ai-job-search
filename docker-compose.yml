version: '3.8'

services:
  # ============================================
  # AI Job Search API
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ai-job-search-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=DEBUG
      - PROFILE_PATH=/app/data/structures/perfil.md
      - OUTPUT_PATH=/app/output
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs
      - ./commands:/app/commands:ro
      - ./skills:/app/skills:ro
      - ./plantillas:/app/plantillas:ro
    depends_on:
      n8n:
        condition: service_healthy
    networks:
      - ai-job-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # n8n Workflow Automation
  # ============================================
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: ai-job-search-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_USER_EMAIL=${N8N_USER_EMAIL:-admin@example.com}
      - N8N_USER_PASSWORD=${N8N_USER_PASSWORD:-admin}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8npassword}
      - EXECUTIONS_DATA_PRUNE_ENABLED=true
      - EXECUTIONS_DATA_MAX_AGE=168  # 7 days
      - GENERIC_TIMEZONE=${TZ:-UTC}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/.n8n/workflows:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ai-job-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5678/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================
  # PostgreSQL Database (for n8n)
  # ============================================
  db:
    image: postgres:15-alpine
    container_name: ai-job-search-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-n8npassword}
      - POSTGRES_DB=n8n
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - ai-job-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # WhatsApp Gateway (Optional - whatsapp-web.js)
  # ============================================
  whatsapp:
    build:
      context: ./whatsapp-gateway
      dockerfile: Dockerfile
    container_name: ai-job-search-whatsapp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - WEBHOOK_URL=http://n8n:5678/webhook/whatsapp
      - SESSION_PATH=/app/data/whatsapp-session
    volumes:
      - ./data/whatsapp-session:/app/data/whatsapp-session
    depends_on:
      n8n:
        condition: service_healthy
    networks:
      - ai-job-network
    profiles:
      - with-whatsapp  # Use: docker-compose --profile with-whatsapp up

  # ============================================
  # Development Container (for local development)
  # ============================================
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ai-job-search-dev
    restart: "no"
    ports:
      - "8001:8000"  # Different port to avoid conflict
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - LOG_LEVEL=DEBUG
      - DEV_MODE=true
    volumes:
      - .:/workspace:cached
      - /workspace/node_modules
    working_dir: /workspace
    command: ["python", "-m", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    networks:
      - ai-job-network
    profiles:
      - dev  # Use: docker-compose --profile dev up

networks:
  ai-job-network:
    driver: bridge

volumes:
  n8n_data:
    driver: local
  db_data:
    driver: local